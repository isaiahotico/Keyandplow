<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Ad Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ad SDKs -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555746'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555727'></script>

    <style>
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .active-status { animation: pulse-red 2s infinite; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-black text-slate-200 min-h-screen flex flex-col overflow-hidden font-sans">

    <!-- Interaction Overlay (Required by Browsers to allow Auto-Ads) -->
    <div id="unlock-layer" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90 cursor-pointer">
        <div class="text-center">
            <div class="mb-4 text-6xl">🚀</div>
            <h2 class="text-2xl font-bold text-white">Click Anywhere to Start</h2>
            <p class="text-slate-400">System requires manual initialization for auto-play</p>
        </div>
    </div>

    <!-- Header -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-red-500 rounded-full active-status"></div>
            <h1 class="font-bold tracking-tighter uppercase text-sm">Auto-Ads Engine v2.0</h1>
        </div>
        <div id="connection-status" class="text-[10px] text-green-500 font-mono">FIREBASE CONNECTED</div>
    </header>

    <!-- Main Display -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 relative">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-transparent to-transparent"></div>
        
        <div class="glass p-10 rounded-3xl shadow-2xl text-center w-full max-w-sm relative z-10">
            <p class="text-slate-500 uppercase text-xs font-bold tracking-[0.2em] mb-2">Total Ads Today</p>
            <div id="ad-count" class="text-8xl font-black text-white drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">0</div>
            
            <div class="mt-10 space-y-4">
                <div class="h-1 bg-slate-800 w-full rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-1000 ease-linear" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[10px] font-mono text-slate-400 uppercase">
                    <span>Cooldown</span>
                    <span id="cooldown-timer">60s</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div id="footer-date" class="text-xs font-mono text-slate-400">00/00/0000 --:--:--</div>
            <div class="text-[10px] text-slate-600">LIMITLESS MODE ACTIVE</div>
        </div>
    </footer>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
