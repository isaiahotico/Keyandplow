<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Ads Reward Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            Ads Auto-Revenue
        </h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 space-y-6 max-w-md mx-auto w-full">
        
        <!-- Unique User ID Card -->
        <div class="bg-slate-900 p-5 rounded-3xl shadow-2xl border border-slate-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-slate-500 text-xs font-bold uppercase tracking-widest">User Identity</h2>
                <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span>
            </div>
            <div class="flex items-center justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800">
                <span id="userId" class="text-sm font-mono text-blue-400">Generating...</span>
                <button onclick="copyUID()" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30 hover:bg-blue-600 hover:text-white transition-all">COPY</button>
            </div>
        </div>

        <!-- Ad Count Card -->
        <div class="relative overflow-hidden bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-blue-100 text-sm font-medium opacity-80">Daily Ads Completed</h2>
                <div id="adCount" class="text-7xl font-black my-2">0</div>
                <p class="text-xs text-blue-200/60 italic font-light">Resets automatically at midnight</p>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <!-- System Status -->
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <div id="status" class="text-center text-xs text-slate-400">
                System Initializing...
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="p-6 bg-slate-900 border-t border-slate-800 text-center">
        <div id="footerDate" class="text-slate-500 text-[10px] uppercase tracking-tighter mb-1"></div>
        <div id="footerTime" class="text-xl font-mono font-bold text-slate-300"></div>
    </footer>

    <script type="module" src="app.js"></script>
    <script>
        function copyUID() {
            const id = document.getElementById('userId').innerText;
            navigator.clipboard.writeText(id);
            alert('UID Copied to clipboard');
        }
    </script>
</body>
</html>
