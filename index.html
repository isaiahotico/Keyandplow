<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Manager Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-6 text-center border-b border-slate-800">
        <h1 class="text-3xl font-bold text-blue-400">Ads Auto-Flow</h1>
        <p class="text-slate-400 text-sm">Automated Interstitial System</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="glass-morphism rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <p class="text-slate-300 uppercase tracking-widest text-xs font-semibold">Stats Today</p>
                <div id="ads-count" class="text-6xl font-black text-white mt-2">0</div>
                <p class="text-slate-400 mt-1">Ads Successfully Played</p>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-800/50 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-sm">Cooldown Status</span>
                    <span id="status-badge" class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-xs font-bold animate-pulse">READY</span>
                </div>
                
                <div class="bg-slate-800/50 p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm">Next Auto-Ad in:</span>
                        <span id="timer" class="text-blue-400 font-mono">00:01</span>
                    </div>
                    <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-6 bg-slate-950/50 border-t border-slate-800 text-center">
        <div id="footer-time" class="text-xl font-mono text-blue-400">00:00:00</div>
        <div id="footer-date" class="text-xs text-slate-500 uppercase tracking-tighter mt-1">Monday, 01 January 2024</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
