<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Rewards Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col overflow-hidden font-sans">

    <!-- TOP USER BAR (REAL-TIME TELEGRAM) -->
    <header class="p-4 bg-slate-900/50 border-b border-blue-500/20 backdrop-blur-md sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-xs">TG</div>
                <span id="userBar" class="font-bold text-blue-400 text-sm tracking-tight">👤 User: Loading...</span>
            </div>
            <div class="bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/30">
                <span class="text-[10px] text-blue-300 font-mono uppercase">Live</span>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow p-6 flex flex-col gap-5 max-w-lg mx-auto w-full overflow-y-auto">
        
        <!-- DAILY ADS COUNTER -->
        <div class="glass-card p-6 rounded-3xl text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
            <h2 class="text-slate-400 uppercase text-[10px] tracking-widest mb-1">Total Daily Ads Played</h2>
            <div id="ads-count" class="text-7xl font-black neon-text text-blue-500">0</div>
            <p class="text-[10px] mt-2 text-slate-500 italic">Automatic reset at 00:00</p>
        </div>

        <!-- COOLDOWN TIMER -->        <div class="glass-card p-5 rounded-2xl border-l-4 border-l-emerald-500">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xs font-bold text-slate-300 uppercase tracking-tighter">Auto-Ad Status</h3>
                    <p id="cooldown-text" class="text-lg font-mono text-emerald-400">Next: <span id="timer">03:00</span></p>
                </div>
                <div class="animate-pulse bg-emerald-500/20 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <button onclick="triggerManualAd()" class="w-full bg-blue-600 hover:bg-blue-500 p-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all active:scale-95">
            Watch Ad Now
        </button>

    </main>

    <!-- FOOTER TIME & DATE -->
    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <div class="flex justify-between items-center max-w-lg mx-auto text-[10px] text-slate-500 font-mono">
            <div id="footer-date">--/--/----</div>
            <div class="h-1 w-1 bg-slate-700 rounded-full"></div>
            <div id="footer-time">00:00:00</div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
