<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads App - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .pulse-red {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center p-4 text-slate-800">

    <div class="w-full max-w-md space-y-4 mt-6 mb-24">
        <!-- Status Indicator -->
        <div id="autoStatus" class="hidden w-full bg-red-500 text-white text-xs font-bold py-1 px-3 rounded-full text-center pulse-red">
            LIMITLESS MODE ACTIVE
        </div>

        <!-- Unique User ID Card -->
        <div class="glass-card rounded-2xl p-4 shadow-xl flex justify-between items-center">
            <div>
                <h2 class="text-xs font-semibold text-slate-500 uppercase">User ID</h2>
                <p id="userId" class="text-lg font-mono font-bold text-blue-600">Loading...</p>
            </div>
            <div class="bg-blue-100 p-2 rounded-lg text-blue-600 font-bold">VIP</div>
        </div>

        <!-- External Link Card -->
        <div class="glass-card rounded-2xl p-4 shadow-xl">
            <h2 class="text-xs font-semibold text-slate-500 uppercase">Partner</h2>
            <a href="https://skilabo.co.jp" target="_blank" class="text-blue-500 hover:underline font-medium break-all">
                https://skilabo.co.jp
            </a>
        </div>

        <!-- Main Action Button (Limitless) -->
        <button id="btnLimitless" onclick="toggleLimitlessMode()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-black py-6 rounded-2xl shadow-2xl transform active:scale-95 transition-all text-xl uppercase tracking-tighter">
            🚀 Start Limitless Ads
        </button>

        <!-- Ads Counter Card -->
        <div class="glass-card rounded-2xl p-6 shadow-xl text-center border-b-4 border-orange-500">
            <h2 class="text-xs font-semibold text-slate-500 uppercase">Daily Earnings Count</h2>
            <p id="adsCount" class="text-6xl font-black text-slate-900 my-2">0</p>
            <div class="flex justify-between text-[10px] text-slate-400 font-bold">
                <span>RESETS AT 00:00</span>
                <span>STATUS: ACTIVE</span>
            </div>
        </div>
    </div>

    <!-- Footer: Time and Date -->
    <footer class="fixed bottom-0 w-full max-w-md glass-card rounded-t-3xl p-4 shadow-2xl text-center">
        <div id="currentTime" class="text-2xl font-black text-slate-700 leading-none">00:00:00</div>
        <div id="currentDate" class="text-xs text-slate-500 font-bold mt-1 uppercase tracking-widest">Loading...</div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
