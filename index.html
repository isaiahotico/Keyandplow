<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Rewards App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-6 text-center border-b border-gray-800">
        <h1 class="text-2xl font-bold text-blue-500">Reward Ads Dashboard</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 space-y-6 max-w-md mx-auto w-full">
        
        <!-- User ID Card -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-blue-500/30">
            <h2 class="text-gray-400 text-sm uppercase tracking-wider mb-2 font-semibold">Unique User Identifier</h2>
            <div class="flex items-center justify-between">
                <span id="userId" class="text-lg font-mono text-blue-400">Loading...</span>
                <button onclick="copyUID()" class="text-xs bg-gray-700 px-3 py-1 rounded hover:bg-gray-600 transition">Copy</button>
            </div>
        </div>

        <!-- Ad Count Card -->
        <div class="bg-gradient-to-br from-indigo-900 to-purple-900 p-8 rounded-2xl shadow-2xl text-center">
            <h2 class="text-gray-200 text-sm mb-2">Daily Ads Played</h2>
            <div id="adCount" class="text-6xl font-black mb-2 text-white">0</div>
            <p class="text-xs text-indigo-300">Resets daily at 00:00</p>
        </div>

        <!-- Status Message -->
        <div id="status" class="text-center text-sm text-gray-500 animate-pulse">
            Waiting for ad initialization...
        </div>

    </main>

    <!-- Footer -->
    <footer class="p-6 bg-gray-800 border-t border-gray-700 text-center">
        <div id="footerDate" class="text-blue-400 font-medium"></div>
        <div id="footerTime" class="text-2xl font-bold"></div>
    </footer>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
    <script>
        function copyUID() {
            const id = document.getElementById('userId').innerText;
            navigator.clipboard.writeText(id);
            alert('UID Copied!');
        }
    </script>
</body>
</html>
