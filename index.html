<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Manager Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-black min-h-screen text-white flex flex-col items-center p-6">

    <!-- Header / Unique ID Card -->
    <div class="w-full max-w-md glass-effect rounded-2xl p-6 shadow-2xl mb-6">
        <h2 class="text-indigo-300 text-sm font-semibold uppercase tracking-wider mb-2">User Identification</h2>
        <div class="flex items-center justify-between">
            <span id="userId" class="text-xl font-mono font-bold text-white">Loading...</span>
            <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </div>

    <!-- Ad Stats Card -->
    <div class="w-full max-w-md bg-white/10 rounded-2xl p-8 border border-white/10 text-center shadow-xl mb-6">
        <p class="text-gray-300 mb-2">Ads Played Today</p>
        <h1 id="adCountDisplay" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            0
        </h1>
        <p id="nextAdTimer" class="mt-4 text-xs text-indigo-300 italic">Next auto-ad in: 60s</p>
    </div>

    <!-- Status Messages -->
    <div id="statusLog" class="w-full max-w-md text-xs text-gray-400 font-mono h-24 overflow-y-auto bg-black/30 p-3 rounded-lg">
        > System initialized...<br>
        > Waiting for SDK trigger...
    </div>

    <!-- Spacer to push footer down -->
    <div class="flex-grow"></div>

    <!-- Footer -->
    <footer class="w-full max-w-md glass-effect rounded-t-xl p-4 mt-10 text-center">
        <p id="footerDateTime" class="text-sm font-medium tracking-widest text-indigo-200">
            -- : -- : -- | -- / -- / --
        </p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
