<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Auto-Streamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(167, 139, 250, 0.8); }
        }
        .active-card { animation: pulse-border 3s infinite; }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex flex-col font-sans overflow-hidden">

    <!-- Navbar -->
    <nav class="p-5 border-b border-white/5 flex justify-between items-center bg-slate-950/50">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            AD-BOT v2.0
        </h1>
        <div id="connection-dot" class="flex items-center gap-2 text-[10px] text-gray-400 uppercase tracking-widest">
            <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span> Firebase Online
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        
        <!-- User ID Card -->
        <div class="glass-panel active-card border w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-6">
                <div class="bg-blue-500/20 p-2 rounded-xl">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Unique User ID</p>
                    <p id="uid-field" class="text-sm font-mono text-blue-300">Generating...</p>
                </div>
            </div>

            <!-- Ad Counter Display -->
            <div class="bg-white/5 rounded-2xl p-5 border border-white/5 text-center">
                <p class="text-[10px] text-slate-400 uppercase mb-1 font-semibold">Ads Played (Today)</p>
                <h2 id="counter-main" class="text-6xl font-black tracking-tighter">0</h2>
            </div>

            <!-- Status Indicator -->
            <div class="mt-6 flex flex-col items-center gap-2">
                <div id="ad-loader" class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="engine-status" class="text-xs text-slate-400 italic">Initializing Engine...</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="glass-panel p-6 border-t border-white/10 mt-auto">
        <div class="max-w-sm mx-auto flex justify-between items-center">
            <div>
                <p id="clock-time" class="text-2xl font-bold tracking-tighter leading-none text-white">00:00:00</p>
                <p id="clock-date" class="text-[10px] text-blue-400 font-black uppercase mt-1">Loading Date...</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-slate-500 uppercase leading-tight font-bold">Auto-Backup<br><span class="text-green-400">Enabled</span></p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
