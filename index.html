<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Revenue System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Legacy SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .grad-text {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-6 text-center border-b border-white/5">
        <h1 class="text-2xl font-black tracking-tighter uppercase grad-text">Ad-Engine Auto</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-3xl p-8 shadow-2xl space-y-6">
            
            <!-- User Info Card -->
            <div class="text-center">
                <div class="inline-block p-3 rounded-full bg-blue-500/10 mb-4">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h2 class="text-xs uppercase tracking-widest text-slate-500 font-bold">Unique User ID</h2>
                <!-- UID Display with fix -->
                <p id="uid-display" class="text-lg font-mono text-blue-400 font-bold mt-1">INITIALIZING...</p>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-black/20 rounded-2xl p-4 text-center">
                    <span class="text-[10px] uppercase text-slate-500 block mb-1">Today's Ads Count</span>
                    <span id="daily-count" class="text-5xl font-black text-white">0</span>
                </div>
            </div>

            <!-- Status Indicator -->
            <div class="flex items-center justify-center space-x-2 py-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span id="ad-status" class="text-xs font-medium text-slate-400 uppercase tracking-widest">Waiting for Cooldown...</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="glass mt-auto p-5 border-t border-white/10">
        <div class="max-w-sm mx-auto flex justify-between items-center">
            <div>
                <p id="footer-time" class="text-xl font-bold text-white leading-none">00:00:00</p>
                <p id="footer-date" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">Loading Date...</p>
            </div>
            <div class="text-right">
                <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">LIVE DATABASE</span>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
