<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Manager Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555746'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555727'></script>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-6 text-center border-b border-slate-800">
        <h1 class="text-3xl font-bold text-blue-400">Ads System Pro</h1>
        <p class="text-slate-400 text-sm">Automated Ad Revenue Stream</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <!-- Stats Card -->
        <div class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-xl font-semibold mb-2">Daily Ads Played</h2>
            <div id="ad-count" class="text-6xl font-black text-green-400 my-4">0</div>
            <p class="text-slate-400 text-xs">Resets automatically at midnight</p>
            
            <div class="mt-8 space-y-3">
                <div class="flex justify-between text-sm">
                    <span>Status:</span>
                    <span class="text-green-500 font-bold animate-pulse">Running</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>Next Auto-Ad:</span>
                    <span id="cooldown-timer" class="text-blue-400">60s</span>
                </div>
            </div>
        </div>

        <button onclick="manualTrigger()" class="mt-6 bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full transition-all">
            Manual Trigger
        </button>
    </main>

    <!-- Footer -->
    <footer class="p-4 bg-slate-950 border-t border-slate-800 text-center">
        <div id="footer-date" class="text-sm font-mono text-slate-500">
            -- Loading Date & Time --
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Custom App Logic -->
    <script src="app.js"></script>
</body>
</html>
