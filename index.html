<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Rewards App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-between font-sans">

    <!-- Top Header -->
    <header class="w-full bg-blue-600 p-4 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold tracking-wider">PREMIUM AD REWARDS</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-md">
        
        <!-- User ID Card -->
        <div class="glass-card w-full rounded-2xl p-6 shadow-xl mb-6 border-t-4 border-blue-500">
            <p class="text-gray-500 text-sm font-semibold uppercase mb-1">Unique User ID</p>
            <div id="user-id" class="text-lg font-mono font-bold text-blue-800 bg-blue-50 p-3 rounded-lg border border-blue-100 break-all">
                Loading...
            </div>
        </div>

        <!-- Ad Stats Card -->
        <div class="glass-card w-full rounded-2xl p-6 shadow-xl text-center space-y-4">
            <div>
                <p class="text-gray-500 text-sm font-semibold uppercase">Daily Ads Played</p>
                <h2 id="ad-count" class="text-5xl font-black text-slate-800">0</h2>
            </div>
            
            <div class="h-px bg-gray-200 w-full"></div>

            <div>
                <p class="text-gray-500 text-xs font-semibold uppercase mb-2">Next Auto-Ad In</p>
                <div class="relative w-full h-4 bg-gray-200 rounded-full overflow-hidden">
                    <div id="cooldown-progress" class="absolute top-0 left-0 h-full bg-green-500 transition-all duration-1000" style="width: 100%"></div>
                </div>
                <p id="cooldown-timer" class="text-sm font-bold text-green-600 mt-1">60s</p>
            </div>
        </div>

        <!-- Manual Button -->
        <button onclick="triggerRandomAd()" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform active:scale-95 transition-all">
            Watch Ad Now
        </button>
    </main>

    <!-- Footer -->
    <footer class="w-full bg-slate-800 text-slate-300 p-4">
        <div class="flex justify-between items-center text-xs px-4">
            <div id="footer-date">--/--/----</div>
            <div id="footer-time" class="font-mono text-sm font-bold text-white">00:00:00</div>
        </div>
    </footer>

    <!-- Firebase App (Compatibility Layer) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
