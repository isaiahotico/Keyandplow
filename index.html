<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Ads App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
   <script src='//libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555663'></script>
   <script src='//libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555663'></script>

    <style>
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center glass border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold tracking-widest uppercase text-slate-400">System Live</span>
        </div>
        <h1 class="text-lg font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">AD-FLOW AI</h1>
    </header>

    <!-- Main Dashboard -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        
        <!-- UID Card -->
        <div class="glass w-full max-w-sm rounded-[2rem] p-6 glow-blue border border-blue-500/20">
            <div class="flex flex-col items-center text-center space-y-4">
                <div class="p-3 bg-blue-500/10 rounded-2xl">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                </div>
                <div>
                    <h2 class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Unique Identifier</h2>
                    <p id="uid-display" class="text-lg font-mono text-blue-300 font-bold">LOADING...</p>
                </div>
            </div>

            <!-- Ads Counter -->
            <div class="mt-8 bg-black/40 rounded-3xl p-6 border border-white/5 relative overflow-hidden">
                <div class="relative z-10 text-center">
                    <p class="text-[10px] uppercase text-slate-500 font-bold mb-1">Daily Ads Completed</p>
                    <h3 id="daily-ads-count" class="text-6xl font-black text-white tracking-tighter">0</h3>
                </div>
                <!-- Progress Bar Background -->
                <div class="absolute bottom-0 left-0 h-1 bg-blue-600 transition-all duration-500" id="ad-progress" style="width: 0%"></div>
            </div>

            <!-- Status Logs -->
            <div id="engine-log" class="mt-6 text-center">
                <p class="text-[11px] text-blue-400/80 italic animate-pulse">Initializing Ad Engines...</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="glass p-5 border-t border-white/10">
        <div class="max-w-sm mx-auto flex justify-between items-center">
            <div class="space-y-1">
                <p id="time-display" class="text-2xl font-black tracking-tighter text-white leading-none">00:00:00</p>
                <p id="date-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">---</p>
            </div>
            <div class="text-right">
                <div class="text-[9px] font-bold text-slate-400 uppercase">In-App Cooldown</div>
                <div id="inapp-timer" class="text-xs font-mono text-indigo-400">120s</div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
