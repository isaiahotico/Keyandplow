<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Concept App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="text-white font-sans pb-20">

    <div class="container mx-auto p-4 space-y-6">
        <!-- Header & Ad Counter -->
        <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl border border-white/20">
            <div>
                <h1 class="text-xl font-bold tracking-tight">ADS DASHBOARD</h1>
                <p class="text-xs opacity-70">Daily Progress</p>
            </div>
            <div class="text-right">
                <span id="adCountDisplay" class="text-3xl font-black text-yellow-400">0</span>
                <p class="text-[10px] uppercase tracking-widest">Ads Played Today</p>
            </div>
        </div>

        <!-- Unique User ID Card -->
        <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h2 class="text-sm font-semibold text-gray-400 uppercase">Unique User ID</h2>
            <p id="userIdDisplay" class="text-2xl font-mono font-bold mt-1 break-all text-indigo-600">Loading...</p>
        </div>

        <!-- Web Card (Iframe) -->
        <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border-4 border-white/10 h-[400px]">
            <div class="bg-gray-800 p-2 flex items-center space-x-2">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <span class="text-[10px] opacity-50 px-2">skilabo.co.jp</span>
            </div>
            <iframe src="https://skilabo.co.jp" class="w-full h-full border-none bg-white"></iframe>
        </div>
    </div>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/10 backdrop-blur-md border-t border-white/20 p-4 text-center">
        <div id="footerDateTime" class="text-sm font-medium tracking-wider">
            Loading Date & Time...
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
