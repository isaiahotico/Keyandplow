<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Rewards App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-black min-h-screen flex flex-col items-center justify-between text-white font-sans">

    <!-- Header / Navbar -->
    <div class="w-full p-6 text-center">
        <h1 class="text-3xl font-bold tracking-widest uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">
            Ad-Stream Pro
        </h1>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center w-full px-4">
        
        <!-- User Card -->
        <div class="glass-morphism rounded-3xl p-8 w-full max-w-md shadow-2xl transform transition hover:scale-105">
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full flex items-center justify-center mb-4 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                
                <h2 class="text-gray-300 text-sm uppercase tracking-widest">User Identifier</h2>
                <p id="userIdDisplay" class="text-xl font-mono text-cyan-400 mt-1">Loading...</p>
                
                <div class="mt-8 grid grid-cols-1 w-full gap-4">
                    <div class="bg-black/30 p-4 rounded-2xl text-center border border-white/10">                        <p class="text-xs text-gray-400 uppercase">Ads Watched Today</p>
                        <p id="dailyCount" class="text-4xl font-black text-white">0</p>
                    </div>
                </div>

                <div id="statusIndicator" class="mt-6 flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <p class="text-sm text-green-400 font-medium italic">Auto-Ad engine active...</p>
                </div>
            </div>
        </div>

        <p class="mt-6 text-gray-400 text-sm">Next ad will trigger automatically after cooldown.</p>
    </main>

    <!-- Footer -->
    <footer class="w-full bg-black/40 backdrop-blur-md p-4 mt-auto border-t border-white/10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span id="footerDate" class="text-xs text-gray-400 font-medium">--/--/----</span>
                <span id="footerTime" class="text-lg font-bold text-gray-200 tracking-tighter">00:00:00</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Firebase Database Connected</p>
                <div class="flex justify-end gap-1">
                    <div class="h-1 w-4 bg-cyan-500 rounded-full"></div>
                    <div class="h-1 w-1 bg-cyan-500 rounded-full"></div>
                </div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
