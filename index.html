<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-between p-4 text-slate-800">

    <div class="w-full max-w-md space-y-4 mt-10">
        <!-- Unique User ID Card -->
        <div class="glass-card rounded-2xl p-6 shadow-xl text-center">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Unique User ID</h2>
            <p id="userId" class="text-2xl font-mono font-bold text-blue-600 mt-2">Loading...</p>
        </div>

        <!-- External Link Card -->
        <div class="glass-card rounded-2xl p-6 shadow-xl text-center">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Partner Link</h2>
            <a href="https://skilabo.co.jp" target="_blank" class="block mt-2 text-blue-500 hover:underline font-medium">
                https://skilabo.co.jp
            </a>
        </div>

        <!-- Ads Counter Card -->
        <div class="glass-card rounded-2xl p-6 shadow-xl text-center border-t-4 border-orange-500">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Ads Played Today</h2>
            <p id="adsCount" class="text-5xl font-black text-orange-500 mt-2">0</p>
            <p class="text-xs text-slate-400 mt-2 italic">Resets daily at midnight</p>
        </div>
    </div>

    <!-- Footer: Time and Date -->
    <footer class="w-full max-w-md glass-card rounded-t-2xl p-4 mt-8 shadow-2xl text-center">
        <div id="currentTime" class="text-xl font-bold text-slate-700">00:00:00</div>
        <div id="currentDate" class="text-sm text-slate-500 font-medium">Loading Date...</div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <!-- Custom App Logic -->
    <script src="app.js"></script>
</body>
</html>
