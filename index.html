<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads App Pro - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Zone SDKs - One for each ID to ensure they are available -->
    <script src='https://libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <script src='https://libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555746'></script>
    <script src='https://libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555727'></script>

    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center p-4 text-slate-800 font-sans">

    <div class="w-full max-w-md space-y-4 mt-6 mb-32">
        <!-- System Alert -->
        <div id="debugLog" class="text-[10px] bg-black text-green-400 p-2 rounded font-mono h-16 overflow-y-auto mb-2 opacity-80">
            System Initialized... Waiting for Ads.
        </div>

        <!-- User Info -->
        <div class="glass-card rounded-2xl p-4 shadow-xl flex justify-between items-center border-l-4 border-blue-500">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase">Current User Session</p>
                <p id="userId" class="text-lg font-mono font-black text-slate-700">Generating...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Status</p>
                <p class="text-xs font-bold text-green-500">ONLINE</p>
            </div>
        </div>

        <!-- External Link -->
        <div class="glass-card rounded-2xl p-4 shadow-xl">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-1">Partner Portal</h2>
            <a href="https://skilabo.co.jp" target="_blank" class="text-blue-600 hover:text-blue-800 font-bold break-all underline italic text-sm">
                https://skilabo.co.jp
            </a>
        </div>

        <!-- Limitless Toggle Button -->
        <button id="btnLimitless" onclick="toggleLimitlessMode()" class="w-full bg-gradient-to-br from-orange-500 via-red-500 to-pink-600 text-white font-black py-8 rounded-3xl shadow-2xl transition-all active:scale-90 text-2xl uppercase italic tracking-tighter">
            START UNLIMITED ADS
        </button>

        <!-- Ads Played Display -->
        <div class="glass-card rounded-2xl p-8 shadow-xl text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-slate-200">
                <div id="progressBar" class="h-full bg-blue-500 w-0 transition-all duration-500"></div>
            </div>
            <h2 class="text-xs font-bold text-slate-400 uppercase">Ads Played Today</h2>
            <p id="adsCount" class="text-7xl font-black text-slate-900 my-2">0</p>
            <p class="text-[10px] text-slate-400 font-bold">RESETS AT MIDNIGHT (00:00:00)</p>
        </div>
    </div>

    <!-- Footer: Time and Date -->
    <footer class="fixed bottom-0 w-full max-w-md glass-card rounded-t-3xl p-6 shadow-[0_-10px_25px_rgba(0,0,0,0.3)] text-center">
        <div id="currentTime" class="text-3xl font-black text-slate-800 tracking-tight">00:00:00</div>
        <div id="currentDate" class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Loading Date...</div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
