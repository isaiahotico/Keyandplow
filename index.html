
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Free Faucet - Claim Every 5 Minutes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .usdt-gradient { background: linear-gradient(135deg, #26A17B 0%, #1a7a5d 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="usdt-gradient p-2 rounded-lg text-white">
                    <i class="fa-solid fa-droplet"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">GamerFaucet</span>
            </div>
            <div class="hidden md:flex gap-6 font-medium text-gray-600">
                <a href="#" class="hover:text-green-600">Home</a>
                <a href="#" class="hover:text-green-600">Leaderboard</a>
                <a href="#" class="hover:text-green-600">Advertise</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto mt-10 px-4">
        
        <!-- Faucet Card -->
        <div class="glass-card rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="usdt-gradient p-8 text-center text-white">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT" class="w-16 h-16 mx-auto mb-4 brightness-0 invert">
                <h1 class="text-3xl font-bold">Free USDT Faucet</h1>
                <p class="opacity-90 mt-2">Claim 0.0005 USDT every 5 minutes directly to FaucetPay</p>
            </div>

            <div class="p-8">
                <!-- Alert Messages -->
                <div id="messageBox" class="hidden mb-6 p-4 rounded-lg text-center font-medium"></div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">FaucetPay Email or USDT Address</label>
                        <input type="text" id="walletAddress"

                            class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none transition-all text-lg"
                            placeholder="Enter your email or address...">
                    </div>

                    <!-- Ad Placeholder -->
                    <div class="bg-gray-50 border-2 border-dashed border-gray-200 p-4 text-center text-gray-400 rounded-xl">
                        <p class="text-xs uppercase tracking-widest">Advertisement</p>
                        <div class="h-20 flex items-center justify-center italic">Your Ad Here</div>
                    </div>

                    <button id="claimBtn" class="w-full usdt-gradient text-white py-4 rounded-xl text-xl font-bold hover:opacity-90 transform active:scale-95 transition-all shadow-lg">
                        <i class="fa-solid fa-bolt-lightning mr-2"></i> CLAIM NOW
                    </button>

                    <!-- Cooldown Timer (Hidden by default) -->
                    <div id="timerContainer" class="hidden text-center p-4 bg-orange-50 text-orange-700 rounded-xl font-bold">
                        Wait <span id="countdown">300</span> seconds to claim again.
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="mt-12 mb-20">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left text-green-600"></i> Recent Payouts
            </h2>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-gray-600">User</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Amount</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Time</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Status</th>
                        </tr>
                    </thead>
                    <tbody id="payoutTable">
                        <!-- Rows will be injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
