<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Ad System | Unique Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ad SDKs -->
    <script src='//libtl.com/sdk.js' data-zone='10555663' data-sdk='show_10555663'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555746'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555727'></script>

    <style>
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-dot { animation: pulse-soft 2s infinite; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .user-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col font-sans">

    <!-- Interaction Overlay -->
    <div id="unlock-layer" class="fixed inset-0 z-50 flex items-center justify-center bg-black cursor-pointer">
        <div class="text-center p-6">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                <span class="text-3xl">⚡</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">INITIALIZE SYSTEM</h2>
            <p class="text-slate-500 animate-bounce">Click anywhere to begin limitless ads</p>
        </div>
    </div>

    <!-- Header -->
    <header class="p-4 bg-slate-900/50 border-b border-slate-800 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-green-500 rounded-full status-dot"></div>
            <h1 class="font-bold text-xs tracking-widest uppercase text-blue-400">Ad Engine Live</h1>
        </div>
        <div id="connection-status" class="text-[10px] font-mono text-slate-500 uppercase">Syncing to Firebase...</div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 space-y-6">
        
        <!-- Main Counter -->
        <div class="glass p-12 rounded-[2.5rem] shadow-2xl text-center w-full max-w-sm">
            <p class="text-slate-500 uppercase text-[10px] font-bold tracking-[0.3em] mb-4">Session Ad Count</p>            <div id="ad-count" class="text-8xl font-black text-white drop-shadow-lg">0</div>
            
            <!-- 1 min Cooldown UI -->
            <div class="mt-8 space-y-2">
                <div class="flex justify-between text-[10px] font-bold text-slate-500">
                    <span>NEXT AUTO-INAPP</span>
                    <span id="cooldown-timer">1s</span>
                </div>
                <div class="h-1.5 bg-slate-800 w-full rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-1000 ease-linear" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- User Info Card (50% width on larger screens) -->
        <div class="user-card w-full md:w-1/2 p-6 rounded-2xl border border-slate-700/50 shadow-xl">
            <div class="flex items-center justify-between border-b border-slate-700/50 pb-3 mb-3">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-wider">User Profile</span>
                <span class="text-[10px] text-slate-500 font-mono">Active Session</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-slate-500 text-[10px] uppercase">Unique ID</p>
                    <p id="display-uid" class="font-mono text-xs text-slate-300 truncate font-bold">Generating...</p>
                </div>
                <div class="text-right">
                    <p class="text-slate-500 text-[10px] uppercase">Total Saved</p>
                    <p id="display-total" class="font-mono text-xs text-green-400 font-bold">0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-4 bg-slate-900 border-t border-slate-800 mt-auto">
        <div class="max-w-4xl mx-auto flex flex-col items-center gap-1">
            <div id="footer-date" class="text-[10px] font-mono text-slate-500 uppercase tracking-tighter">
                Loading Date & Time...
            </div>
            <div class="text-[8px] text-slate-700 tracking-widest uppercase">Limitless Ad Automation Mode</div>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
